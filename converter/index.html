<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BioassayCraft concentration unit converter for mass and molar concentration.">
  <title>Concentration Converter | BioassayCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    :root {
      color-scheme: light;
      --background: #f0eee9;
      --surface: #fffdf8;
      --surface-soft: #f8f6f0;
      --text: #282725;
      --muted: #6f6a63;
      --quiet: #a39b90;
      --rule: #ded6ca;
      --accent: #174ea6;
      --accent-soft: rgba(23, 78, 166, 0.08);
      --focus-ring: rgba(23, 78, 166, 0.16);
      --sage: #7d8f78;
      --warn: #b42318;
      --max-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--background);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    .page,
    .site-footer {
      width: min(1040px, calc(100% - 48px));
      margin: 0 auto;
    }

    .page {
      min-height: calc(100vh - 87px);
      padding: 34px 0 68px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      padding: 18px 0 42px;
    }

    .brand-link,
    .back-link {
      display: inline-flex;
      align-items: center;
      color: var(--text);
      text-decoration: none;
    }

    .brand-link {
      gap: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .back-link {
      min-height: 40px;
      padding: 0 14px;
      color: var(--accent);
      border: 1px solid rgba(23, 78, 166, 0.32);
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background-color 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .back-link:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .brand-symbol {
      position: relative;
      display: block;
      width: 34px;
      height: 34px;
      color: var(--accent);
      flex: 0 0 auto;
    }

    .brand-symbol::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid currentColor;
    }

    .axis,
    .curve,
    .point {
      position: absolute;
      display: block;
    }

    .axis {
      background: currentColor;
      opacity: 0.9;
    }

    .axis.horizontal {
      left: 5px;
      right: 5px;
      bottom: 11px;
      height: 1px;
    }

    .axis.vertical {
      left: 11px;
      top: 5px;
      bottom: 5px;
      width: 1px;
    }

    .curve {
      left: 11px;
      top: 10px;
      width: 17px;
      height: 13px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      border-radius: 0 14px 0 0;
    }

    .point {
      width: 4px;
      height: 4px;
      background: var(--sage);
    }

    .point-a {
      left: 9px;
      bottom: 9px;
    }

    .point-b {
      right: 7px;
      top: 9px;
    }

    .eyebrow {
      display: block;
      color: var(--sage);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      max-width: 14ch;
      margin-top: 16px;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1;
    }

    .subtitle {
      max-width: 520px;
      margin-top: 18px;
      margin-bottom: 34px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.65;
    }

    .tool {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 36px;
      align-items: start;
    }

    .panel {
      position: relative;
      padding-top: 24px;
      border-top: 1px solid var(--text);
      animation: reveal 760ms ease both;
    }

    .panel:nth-child(2) {
      animation-delay: 80ms;
    }

    .panel::after {
      content: "";
      position: absolute;
      top: 24px;
      right: 0;
      width: 36px;
      height: 36px;
      border-top: 1px solid var(--rule);
      border-right: 1px solid var(--rule);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 500;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 158px;
      gap: 10px;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--rule);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.94rem;
      outline: none;
      transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input {
      font-family: var(--font-mono);
      padding: 10px 12px;
    }

    select {
      padding: 10px 34px 10px 12px;
    }

    input::placeholder {
      color: var(--quiet);
    }

    input:hover,
    select:hover {
      background: #ffffff;
      border-color: #cfc6b9;
    }

    input:focus,
    select:focus {
      background: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .hint,
    .error {
      min-height: 22px;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .hint {
      color: var(--muted);
    }

    .error {
      color: var(--warn);
      font-weight: 500;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.05rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0;
    }

    .base {
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .results {
      display: grid;
      gap: 10px;
    }

    .result {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 58px;
      padding: 11px 13px;
      border: 1px solid var(--rule);
      border-radius: 7px;
      background: var(--surface);
    }

    .result.active {
      border-color: rgba(23, 78, 166, 0.38);
      background: var(--accent-soft);
    }

    .unit {
      color: var(--text);
      font-weight: 600;
    }

    .unit small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 500;
    }

    .result-value {
      font-size: 0.94rem;
      font-weight: 500;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .formula {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
      color: var(--muted);
      background: transparent;
      font-size: 0.8rem;
      line-height: 1.7;
    }

    .site-footer {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 28px 0 38px;
      color: var(--muted);
      border-top: 1px solid var(--rule);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.995);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 820px) {
      .page,
      .site-footer {
        width: min(100% - 32px, 1040px);
      }

      .page {
        padding-top: 22px;
      }

      .site-header {
        padding-bottom: 34px;
      }

      .tool {
        grid-template-columns: 1fr;
        gap: 34px;
      }

      .panel {
        padding-bottom: 20px;
      }
    }

    @media (max-width: 560px) {
      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .back-link {
        width: 100%;
        justify-content: center;
      }

      .subtitle {
        font-size: 0.94rem;
      }

      .input-row,
      .result {
        grid-template-columns: 1fr;
      }

      .result-value {
        text-align: left;
      }

      .result-head {
        display: grid;
      }

      .base {
        white-space: normal;
      }

      .site-footer {
        flex-direction: column;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-header">
      <a class="brand-link" href="../" aria-label="BioassayCraft home">
        <span class="brand-symbol" aria-hidden="true">
          <span class="axis horizontal"></span>
          <span class="axis vertical"></span>
          <span class="curve"></span>
          <span class="point point-a"></span>
          <span class="point point-b"></span>
        </span>
        <span class="brand-name">bioassaycraft</span>
      </a>
      <a class="back-link" href="../">Back to home</a>
    </header>

    <section class="tool" aria-labelledby="page-title">
      <div class="panel">
        <span class="eyebrow">Interactive tool</span>
        <h1 id="page-title">Concentration Converter</h1>
        <p class="subtitle">输入任意一个浓度和分子量，自动换算质量浓度与摩尔浓度。</p>

        <div class="field">
          <label for="concentration">浓度</label>
          <div class="input-row">
            <input id="concentration" class="numeric" type="number" min="0" step="any" inputmode="decimal" placeholder="例如 10">
            <select id="sourceUnit" aria-label="浓度单位">
              <option value="ngml" selected>ng/mL</option>
              <option value="ugml">μg/mL</option>
              <option value="mgml">mg/mL</option>
              <option value="nm">nM</option>
              <option value="um">μM</option>
              <option value="m">M</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="molecularWeight">分子量 MW</label>
          <div class="input-row">
            <input id="molecularWeight" class="numeric" type="number" min="0" step="any" inputmode="decimal" placeholder="例如 500">
            <select id="molecularWeightUnit" aria-label="分子量单位">
              <option value="da">Da</option>
              <option value="kda" selected>kDa</option>
            </select>
          </div>
          <div class="hint">Da 与 g/mol 在数值上等同；选择 kDa 时会自动乘以 1000 后计算。</div>
        </div>

        <div id="message" class="error" role="status" aria-live="polite"></div>
      </div>

      <div class="panel" aria-label="换算结果">
        <div class="result-head">
          <h2>换算结果</h2>
          <span id="baseValue" class="base numeric">等待输入</span>
        </div>

        <div id="results" class="results"></div>

        <div class="formula">
          计算公式：质量浓度 (g/L) = 摩尔浓度 (mol/L) × 分子量 (g/mol)
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span class="brand-name">bioassaycraft</span>
    <span>Concentration Converter</span>
  </footer>

  <script>
    const units = [
      { key: "ngml", label: "ng/mL", name: "纳克/毫升", kind: "mass", gPerL: 1e-6 },
      { key: "ugml", label: "μg/mL", name: "微克/毫升", kind: "mass", gPerL: 1e-3 },
      { key: "mgml", label: "mg/mL", name: "毫克/毫升", kind: "mass", gPerL: 1 },
      { key: "nm", label: "nM", name: "纳摩尔浓度", kind: "molar", molPerL: 1e-9 },
      { key: "um", label: "μM", name: "微摩尔浓度", kind: "molar", molPerL: 1e-6 },
      { key: "m", label: "M", name: "摩尔浓度", kind: "molar", molPerL: 1 }
    ];

    const concentrationInput = document.querySelector("#concentration");
    const molecularWeightInput = document.querySelector("#molecularWeight");
    const molecularWeightUnitSelect = document.querySelector("#molecularWeightUnit");
    const sourceUnitSelect = document.querySelector("#sourceUnit");
    const message = document.querySelector("#message");
    const results = document.querySelector("#results");
    const baseValue = document.querySelector("#baseValue");

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "--";
      if (value === 0) return "0";
      const absolute = Math.abs(value);

      if (absolute >= 1e6 || absolute < 0.0001) {
        return value.toExponential(6).replace(/\.?0+e/, "e");
      }

      return new Intl.NumberFormat("en-US", {
        maximumSignificantDigits: 8
      }).format(value);
    }

    function getInputState() {
      const concentration = Number(concentrationInput.value);
      const molecularWeightValue = Number(molecularWeightInput.value);
      const molecularWeightMultiplier = molecularWeightUnitSelect.value === "kda" ? 1000 : 1;
      const molecularWeight = molecularWeightValue * molecularWeightMultiplier;
      const sourceUnit = units.find((unit) => unit.key === sourceUnitSelect.value);

      if (concentrationInput.value === "" || molecularWeightInput.value === "") {
        return { ready: false, text: "请填写浓度和分子量。" };
      }

      if (!Number.isFinite(concentration) || concentration < 0) {
        return { ready: false, text: "浓度需要是大于或等于 0 的数字。" };
      }

      if (!Number.isFinite(molecularWeightValue) || molecularWeightValue <= 0) {
        return { ready: false, text: "分子量需要是大于 0 的数字。" };
      }

      return { ready: true, concentration, molecularWeight, sourceUnit };
    }

    function toMolPerL(value, unit, molecularWeight) {
      if (unit.kind === "mass") {
        return (value * unit.gPerL) / molecularWeight;
      }

      return value * unit.molPerL;
    }

    function fromMolPerL(molPerL, unit, molecularWeight) {
      if (unit.kind === "mass") {
        return (molPerL * molecularWeight) / unit.gPerL;
      }

      return molPerL / unit.molPerL;
    }

    function renderEmpty(text) {
      message.textContent = text;
      baseValue.textContent = "等待输入";
      results.innerHTML = units.map((unit) => `
        <div class="result">
          <div class="unit">${unit.label}<small>${unit.name}</small></div>
          <div class="result-value">--</div>
        </div>
      `).join("");
    }

    function calculate() {
      const state = getInputState();

      if (!state.ready) {
        renderEmpty(state.text);
        return;
      }

      const molPerL = toMolPerL(state.concentration, state.sourceUnit, state.molecularWeight);
      const gramPerL = molPerL * state.molecularWeight;

      message.textContent = "";
      baseValue.textContent = `${formatNumber(molPerL)} mol/L`;
      results.innerHTML = units.map((unit) => {
        const converted = fromMolPerL(molPerL, unit, state.molecularWeight);
        const activeClass = unit.key === state.sourceUnit.key ? " active" : "";

        return `
          <div class="result${activeClass}">
            <div class="unit">${unit.label}<small>${unit.name}</small></div>
            <div class="result-value">${formatNumber(converted)}</div>
          </div>
        `;
      }).join("");

      baseValue.title = `${formatNumber(gramPerL)} g/L`;
    }

    concentrationInput.addEventListener("input", calculate);
    molecularWeightInput.addEventListener("input", calculate);
    molecularWeightUnitSelect.addEventListener("change", calculate);
    sourceUnitSelect.addEventListener("change", calculate);
    calculate();
  </script>
</body>
</html>
