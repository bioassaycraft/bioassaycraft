<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">BioassayCraft logo concept directions</title>
  <desc id="desc">Ten geometric logo concept directions based on construction, calibration, fitted curves, coordinate systems, and observed points.</desc>
  <defs>
    <style>
      :root {
        --bg: #F7F5F0;
        --black: #171717;
        --blue: #2457B3;
        --secondary: #6E7278;
        --border: #D6D9DE;
      }

      .bg { fill: var(--bg); }
      .panel { fill: none; stroke: var(--border); stroke-width: 1; }
      .label { fill: var(--secondary); font: 500 12px Inter, Arial, sans-serif; letter-spacing: 0; }
      .name { fill: var(--black); font: 600 16px Inter, Arial, sans-serif; letter-spacing: 0; }
      .line { fill: none; stroke: var(--black); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .blue { stroke: var(--blue); }
      .thin { stroke-width: 2; }
      .dot-black { fill: var(--black); }
      .dot-blue { fill: var(--blue); }
      .dot-open { fill: var(--bg); stroke: var(--black); stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" width="960" height="640"/>

  <g transform="translate(32 28)">
    <text class="name" x="0" y="0">BioassayCraft symbol explorations</text>
    <text class="label" x="0" y="24">Constructed knowledge: coordinate systems, fitted models, observations, calibration.</text>
  </g>

  <g transform="translate(32 72)">
    <g transform="translate(0 0)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(48 30)">
        <path class="line" d="M12 6V88H94"/>
        <path class="line blue" d="M21 76C36 62 44 36 78 20"/>
        <circle class="dot-black" cx="32" cy="61" r="4"/>
        <circle class="dot-blue" cx="57" cy="44" r="4"/>
        <circle class="dot-black" cx="81" cy="25" r="4"/>
      </g>
      <text class="name" x="14" y="126">01 Fitted Corner</text>
      <text class="label" x="14" y="146">Axis, curve, residual points.</text>
    </g>

    <g transform="translate(184 0)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(47 32)">
        <path class="line" d="M16 12H88V84"/>
        <path class="line blue" d="M17 70C35 50 56 47 88 24"/>
        <circle class="dot-open" cx="30" cy="58" r="4"/>
        <circle class="dot-black" cx="63" cy="44" r="4"/>
      </g>
      <text class="name" x="14" y="126">02 Inverted Frame</text>
      <text class="label" x="14" y="146">Drafting square meets model.</text>
    </g>

    <g transform="translate(368 0)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(48 30)">
        <path class="line" d="M18 12V88"/>
        <path class="line" d="M18 88H86"/>
        <path class="line blue" d="M24 72C38 75 48 44 62 47C74 50 76 24 90 24"/>
        <circle class="dot-black" cx="39" cy="66" r="4"/>
        <circle class="dot-blue" cx="61" cy="52" r="4"/>
      </g>
      <text class="name" x="14" y="126">03 Residual Wave</text>
      <text class="label" x="14" y="146">Model error made abstract.</text>
    </g>

    <g transform="translate(552 0)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(49 29)">
        <path class="line" d="M14 86H88"/>
        <path class="line" d="M14 86V20"/>
        <path class="line blue" d="M30 70C45 41 62 30 90 30"/>
        <path class="line thin" d="M66 42L85 63"/>
        <circle class="dot-black" cx="43" cy="58" r="4"/>
        <circle class="dot-blue" cx="71" cy="36" r="4"/>
      </g>
      <text class="name" x="14" y="126">04 Tangent Tool</text>
      <text class="label" x="14" y="146">A curve being measured.</text>
    </g>

    <g transform="translate(736 0)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(47 31)">
        <path class="line" d="M12 18H36"/>
        <path class="line" d="M12 18V80"/>
        <path class="line" d="M12 80H36"/>
        <path class="line blue" d="M31 72C45 36 66 24 96 28"/>
        <circle class="dot-black" cx="47" cy="55" r="4"/>
        <circle class="dot-blue" cx="78" cy="31" r="4"/>
      </g>
      <text class="name" x="14" y="126">05 Calibration Bracket</text>
      <text class="label" x="14" y="146">Interval, tolerance, fit.</text>
    </g>

    <g transform="translate(0 192)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(45 31)">
        <path class="line" d="M24 10H88V74H24Z"/>
        <path class="line blue" d="M24 64C38 56 42 34 61 35C72 35 76 22 88 20"/>
        <circle class="dot-black" cx="39" cy="50" r="4"/>
        <circle class="dot-blue" cx="62" cy="39" r="4"/>
      </g>
      <text class="name" x="14" y="126">06 Model Window</text>
      <text class="label" x="14" y="146">A contained learning space.</text>
    </g>

    <g transform="translate(184 192)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(45 31)">
        <path class="line" d="M18 82H92"/>
        <path class="line" d="M18 82L46 18"/>
        <path class="line blue" d="M33 56C45 48 58 41 81 33"/>
        <circle class="dot-black" cx="39" cy="53" r="4"/>
        <circle class="dot-blue" cx="61" cy="39" r="4"/>
        <circle class="dot-open" cx="75" cy="36" r="4"/>
      </g>
      <text class="name" x="14" y="126">07 Drafting Triangle</text>
      <text class="label" x="14" y="146">Construction and inference.</text>
    </g>

    <g transform="translate(368 192)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(44 30)">
        <path class="line" d="M48 12A38 38 0 1 0 84 61"/>
        <path class="line blue" d="M26 65C44 52 54 27 88 19"/>
        <circle class="dot-black" cx="39" cy="53" r="4"/>
        <circle class="dot-blue" cx="70" cy="30" r="4"/>
      </g>
      <text class="name" x="14" y="126">08 Aperture Curve</text>
      <text class="label" x="14" y="146">Instrument-like, not lab-like.</text>
    </g>

    <g transform="translate(552 192)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(45 28)">
        <path class="line" d="M18 86V22"/>
        <path class="line" d="M18 86H86"/>
        <path class="line thin" d="M40 86V74"/>
        <path class="line thin" d="M62 86V74"/>
        <path class="line blue" d="M24 72C38 60 54 45 86 38"/>
        <circle class="dot-black" cx="37" cy="62" r="4"/>
        <circle class="dot-blue" cx="67" cy="43" r="4"/>
      </g>
      <text class="name" x="14" y="126">09 Ruler Fit</text>
      <text class="label" x="14" y="146">Measured craft, minimal.</text>
    </g>

    <g transform="translate(736 192)">
      <rect class="panel" width="160" height="160"/>
      <g transform="translate(47 30)">
        <path class="line" d="M16 54C16 28 34 14 58 14"/>
        <path class="line" d="M16 54C16 80 34 94 58 94"/>
        <path class="line blue" d="M26 75C43 56 62 45 92 37"/>
        <circle class="dot-black" cx="43" cy="58" r="4"/>
        <circle class="dot-blue" cx="76" cy="41" r="4"/>
      </g>
      <text class="name" x="14" y="126">10 Constructed C</text>
      <text class="label" x="14" y="146">Letter hint without monogram.</text>
    </g>

    <g transform="translate(0 396)">
      <text class="name" x="0" y="0">Recommendation</text>
      <text class="label" x="0" y="26">Concept 01 is the strongest foundation: it is abstract, distinctive, favicon-safe, and directly encodes observation plus fitted model without becoming a textbook graph.</text>
      <text class="label" x="0" y="48">Concepts 04 and 09 are useful secondary influences for construction rules, but less iconic as standalone marks.</text>
    </g>
  </g>
</svg>
